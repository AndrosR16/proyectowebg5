<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Superficie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4"
        th:text="${superficie.idSuperficie == null} ? 'Nueva Superficie' : 'Editar Superficie'">
    </h2>

    <form th:action="${superficie.idSuperficie == null} ?
                     @{/superficies/guardar} :
                     @{/superficies/actualizar}"
          th:object="${superficie}"
          method="post">

        <div class="mb-3">

            <label class="form-label">ID</label>

            <input type="number"
                   class="form-control"
                   th:field="*{idSuperficie}"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">Descripción</label>

            <input type="text"
                   class="form-control"
                   th:field="*{descripcion}"
                   required>

        </div>

        <div class="mb-4">

            <label class="form-label">Estado</label>

            <select class="form-select"
                    th:field="*{idEstado}">

                <option th:each="estado : ${estados}"
                        th:value="${estado.idEstado}"
                        th:text="${estado.descripcion}">
                </option>

            </select>

        </div>

        <button type="submit"
                class="btn btn-success">
            Guardar
        </button>

        <a th:href="@{/superficies}"
           class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
