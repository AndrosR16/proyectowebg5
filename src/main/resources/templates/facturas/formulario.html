<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${factura.idFactura == null ? 'Nueva factura' : 'Editar factura'}">
        Factura
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6">

            <div class="card shadow-sm">

                <div class="card-header bg-dark text-white">

                    <h2 class="h4 mb-0"
                        th:text="${factura.idFactura == null ? 'Nueva factura' : 'Editar factura'}">
                        Factura
                    </h2>

                </div>

                <div class="card-body">

                    <form
                        th:action="${factura.idFactura == null
                            ? '/facturas/guardar'
                            : '/facturas/actualizar'}"
                        th:object="${factura}"
                        method="post">

                        <div class="mb-3">

                            <label for="idFactura"
                                   class="form-label">
                                ID de la factura
                            </label>

                            <input
                                type="number"
                                id="idFactura"
                                class="form-control"
                                th:field="*{idFactura}"
                                th:readonly="${factura.idFactura != null}"
                                min="1"
                                required>

                        </div>

                        <div class="mb-3">

                            <label for="idPago"
                                   class="form-label">
                                Pago
                            </label>

                            <select
                                id="idPago"
                                class="form-select"
                                th:field="*{idPago}"
                                required>

                                <option value="">
                                    Seleccione un pago
                                </option>

                                <option
                                    th:each="pago : ${pagos}"
                                    th:value="${pago.idPago}"
                                    th:text="${'Pago #' + pago.idPago + ' - ₡' + pago.monto}">
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label for="numeroFactura"
                                   class="form-label">
                                Número de factura
                            </label>

                            <input
                                type="text"
                                id="numeroFactura"
                                class="form-control"
                                th:field="*{numeroFactura}"
                                maxlength="50"
                                placeholder="Ejemplo: FAC-001"
                                required>

                        </div>

                        <div class="mb-3">

                            <label for="fechaFactura"
                                   class="form-label">
                                Fecha de la factura
                            </label>

                            <input
                                type="date"
                                id="fechaFactura"
                                class="form-control"
                                th:field="*{fechaFactura}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label for="idEstado"
                                   class="form-label">
                                Estado
                            </label>

                            <select
                                id="idEstado"
                                class="form-select"
                                th:field="*{idEstado}"
                                required>

                                <option value="">
                                    Seleccione un estado
                                </option>

                                <option
                                    th:each="estado : ${estados}"
                                    th:value="${estado.idEstado}"
                                    th:text="${estado.descripcion}">
                                </option>

                            </select>

                        </div>

                        <div class="d-flex justify-content-end gap-2">

                            <a th:href="@{/facturas}"
                               class="btn btn-secondary">
                                Cancelar
                            </a>

                            <button type="submit"
                                    class="btn btn-primary"
                                    th:text="${factura.idFactura == null
                                        ? 'Guardar'
                                        : 'Actualizar'}">
                                Guardar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
