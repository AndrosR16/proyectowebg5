<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Facturas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h1 class="mb-1">Facturas</h1>
                <p class="text-muted mb-0">
                    Administración de facturas registradas.
                </p>
            </div>

            <a th:href="@{/facturas/nuevo}" class="btn btn-primary">
                Nueva factura
            </a>

        </div>

        <div class="card shadow-sm">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-striped table-hover align-middle">

                        <thead class="table-dark">

                            <tr>
                                <th>ID</th>
                                <th>ID pago</th>
                                <th>Número de factura</th>
                                <th>Fecha</th>
                                <th>Estado</th>
                                <th class="text-end">Acciones</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="factura : ${facturas}">

                                <td th:text="${factura.idFactura}">
                                    1
                                </td>

                                <td th:text="${factura.idPago}">
                                    1
                                </td>

                                <td th:text="${factura.numeroFactura}">
                                    FAC-001
                                </td>

                                <td th:text="${factura.fechaFactura}">
                                    2026-07-21
                                </td>

                                <td>

                                    <span th:if="${factura.idEstado == 1}" class="badge bg-success">
                                        Activo
                                    </span>

                                    <span th:if="${factura.idEstado == 2}" class="badge bg-secondary">
                                        Inactivo
                                    </span>

                                    <span th:if="${factura.idEstado != 1 && factura.idEstado != 2}"
                                        class="badge bg-warning text-dark" th:text="${factura.idEstado}">
                                        Estado
                                    </span>

                                </td>

                                <td class="text-end">
                                    <a th:href="@{/facturas/imprimir/{id}(id=${factura.idFactura})}"
                                        class="btn btn-info btn-sm">
                                        Imprimir
                                    </a>

                                    <a th:href="@{/facturas/editar/{id}(id=${factura.idFactura})}"
                                        class="btn btn-warning btn-sm">
                                        Editar
                                    </a>

                                    <a th:href="@{/facturas/eliminar/{id}(id=${factura.idFactura})}"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('¿Está seguro de eliminar esta factura?');">
                                        Eliminar
                                    </a>

                                </td>

                            </tr>

                            <tr th:if="${#lists.isEmpty(facturas)}">

                                <td colspan="6" class="text-center text-muted py-4">
                                    No hay facturas registradas.
                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

        <div class="mt-3">

            <a th:href="@{/}" class="btn btn-secondary">
                Volver al inicio
            </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
