<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Listado de horarios</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<main class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h1>Listado de horarios</h1>

            <p class="text-muted">
                Información obtenida desde Oracle mediante procedimientos almacenados.
            </p>
        </div>

        <a
            th:href="@{/horarios/nuevo}"
            class="btn btn-primary">

            Nuevo horario
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Cancha</th>
                        <th>Día</th>
                        <th>Hora inicio</th>
                        <th>Hora fin</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="horario : ${horarios}">

                        <td th:text="${horario.idHorario}"></td>

                        <td th:text="${horario.cancha}"></td>

                        <td th:text="${horario.diaSemana}"></td>

                        <td th:text="${horario.horaInicio}"></td>

                        <td th:text="${horario.horaFin}"></td>

                        <td th:text="${horario.estado}"></td>

                        <td>

                            <a
                                th:href="@{/horarios/editar/{id}(id=${horario.idHorario})}"
                                class="btn btn-warning btn-sm">

                                Editar
                            </a>

                            <form
                                th:action="@{/horarios/eliminar/{id}(id=${horario.idHorario})}"
                                method="post"
                                class="d-inline">

                                <button
                                    type="submit"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('¿Desea inactivar este horario?')">

                                    Inactivar

                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(horarios)}">

                        <td colspan="7" class="text-center text-muted">

                            No hay horarios registrados.

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <div class="mt-4">

        <a
            th:href="@{/}"
            class="btn btn-secondary">

            Volver al inicio

        </a>

    </div>

</main>

</body>

</html>
