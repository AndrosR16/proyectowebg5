<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario de horario</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<main class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow-sm">

                <div class="card-body p-4">

                    <h1 class="mb-4"
                        th:text="${horario.idHorario == null ? 'Nuevo horario' : 'Editar horario'}">
                    </h1>

                    <div
                            class="alert alert-danger"
                            th:if="${error}"
                            th:text="${error}">
                    </div>

                    <form
                            th:action="@{/horarios/guardar}"
                            th:object="${horario}"
                            method="post"
                            novalidate>

                        <div class="mb-3">

                            <label for="idHorario" class="form-label">
                                ID del horario
                            </label>

                            <input
                                    type="number"
                                    id="idHorario"
                                    th:field="*{idHorario}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('idHorario')} ? ' is-invalid' : ''"
                                    min="1"
                                    th:readonly="${horario.idHorario != null}">

                            <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('idHorario')}"
                                    th:errors="*{idHorario}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label for="idCancha" class="form-label">
                                Cancha
                            </label>

                            <select
                                    id="idCancha"
                                    th:field="*{idCancha}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('idCancha')} ? ' is-invalid' : ''">

                                <option value="">
                                    Seleccione una cancha
                                </option>

                                <option
                                        th:each="cancha : ${canchas}"
                                        th:value="${cancha.idCancha}"
                                        th:text="${cancha.nombreCancha}">
                                </option>

                            </select>

                            <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('idCancha')}"
                                    th:errors="*{idCancha}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label for="diaSemana" class="form-label">
                                Día de la semana
                            </label>

                            <select
                                    id="diaSemana"
                                    th:field="*{diaSemana}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('diaSemana')} ? ' is-invalid' : ''">

                                <option value="">Seleccione un día</option>
                                <option value="Lunes">Lunes</option>
                                <option value="Martes">Martes</option>
                                <option value="Miércoles">Miércoles</option>
                                <option value="Jueves">Jueves</option>
                                <option value="Viernes">Viernes</option>
                                <option value="Sábado">Sábado</option>
                                <option value="Domingo">Domingo</option>

                            </select>

                            <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('diaSemana')}"
                                    th:errors="*{diaSemana}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label for="horaInicio" class="form-label">
                                Hora de inicio
                            </label>

                            <input
                                    type="time"
                                    id="horaInicio"
                                    th:field="*{horaInicio}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('horaInicio')} ? ' is-invalid' : ''">

                            <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('horaInicio')}"
                                    th:errors="*{horaInicio}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label for="horaFin" class="form-label">
                                Hora de fin
                            </label>

                            <input
                                    type="time"
                                    id="horaFin"
                                    th:field="*{horaFin}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('horaFin')} ? ' is-invalid' : ''">

                            <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('horaFin')}"
                                    th:errors="*{horaFin}">
                            </div>

                        </div>

                        <div class="mb-4">

                            <label for="idEstado" class="form-label">
                                Estado
                            </label>

                            <select
                                    id="idEstado"
                                    th:field="*{idEstado}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('idEstado')} ? ' is-invalid' : ''">

                                <option value="">
                                    Seleccione un estado
                                </option>

                                <option
                                        th:each="estado : ${estados}"
                                        th:value="${estado.idEstado}"
                                        th:text="${estado.descripcion}">
                                </option>

                            </select>

                            <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('idEstado')}"
                                    th:errors="*{idEstado}">
                            </div>

                        </div>

                        <div class="d-flex gap-2">

                            <button
                                    type="submit"
                                    class="btn btn-primary">

                                Guardar

                            </button>

                            <a
                                    th:href="@{/horarios}"
                                    class="btn btn-secondary">

                                Cancelar

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</main>

</body>

</html>
