<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Listado de canchas</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <main class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h1>Listado de canchas</h1>
                <p class="text-muted">
                    Información obtenida desde Oracle mediante procedimientos almacenados.
                </p>
            </div>

            <a
                th:href="@{/canchas/nueva}"
                class="btn btn-primary">

                Nueva cancha
            </a>
        </div>

        <div class="card shadow-sm">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">

                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Capacidad</th>
                                <th>Precio por hora</th>
                                <th>Superficie</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="cancha : ${canchas}">

                                <td th:text="${cancha.idCancha}"></td>

                                <td th:text="${cancha.nombreCancha}"></td>

                                <td th:text="${cancha.capacidad}"></td>

                                <td th:text="${cancha.precioHora}"></td>

                                <td th:text="${cancha.superficie}"></td>

                                <td th:text="${cancha.estado}"></td>

                                <td>

                                    <a
                                        th:href="@{/canchas/editar/{id}(id=${cancha.idCancha})}"
                                        class="btn btn-warning btn-sm">

                                        Editar
                                    </a>

                                    <form
                                        th:action="@{/canchas/eliminar/{id}(id=${cancha.idCancha})}"
                                        method="post"
                                        class="d-inline">

                                        <button
                                            type="submit"
                                            class="btn btn-danger btn-sm"
                                            onclick="return confirm('¿Desea inactivar esta cancha?')">

                                            Inactivar
                                        </button>

                                    </form>

                                </td>

                            </tr>

                            <tr th:if="${#lists.isEmpty(canchas)}">

                                <td colspan="7" class="text-center text-muted">

                                    No hay canchas registradas.

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

        <div class="mt-4">

            <a th:href="@{/}" class="btn btn-secondary">
                Volver al inicio
            </a>

        </div>

    </main>

</body>

</html>
