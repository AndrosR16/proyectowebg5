<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario de cancha</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <main class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card shadow-sm">

                    <div class="card-body p-4">

                        <h1 class="mb-4"
                            th:text="${cancha.idCancha == null ? 'Nueva cancha' : 'Editar cancha'}">
                        </h1>

                        <div
                            class="alert alert-danger"
                            th:if="${error}"
                            th:text="${error}">
                        </div>

                        <form
                            th:action="@{/canchas/guardar}"
                            th:object="${cancha}"
                            method="post"
                            novalidate>

                            <div class="mb-3">

                                <label for="idCancha" class="form-label">
                                    ID de la cancha
                                </label>

                                <input
                                    type="number"
                                    id="idCancha"
                                    th:field="*{idCancha}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('idCancha')} ? ' is-invalid' : ''"
                                    min="1"
                                    th:readonly="${cancha.idCancha != null}">

                                <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('idCancha')}"
                                    th:errors="*{idCancha}">
                                </div>

                                <div class="form-text">
                                    El ID debe ser único.
                                </div>

                            </div>

                            <div class="mb-3">

                                <label for="nombreCancha" class="form-label">
                                    Nombre
                                </label>

                                <input
                                    type="text"
                                    id="nombreCancha"
                                    th:field="*{nombreCancha}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('nombreCancha')} ? ' is-invalid' : ''"
                                    maxlength="100">

                                <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('nombreCancha')}"
                                    th:errors="*{nombreCancha}">
                                </div>

                            </div>

                            <div class="mb-3">

                                <label for="capacidad" class="form-label">
                                    Capacidad
                                </label>

                                <input
                                    type="number"
                                    id="capacidad"
                                    th:field="*{capacidad}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('capacidad')} ? ' is-invalid' : ''"
                                    min="1">

                                <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('capacidad')}"
                                    th:errors="*{capacidad}">
                                </div>

                            </div>

                            <div class="mb-3">

                                <label for="precioHora" class="form-label">
                                    Precio por hora
                                </label>

                                <input
                                    type="number"
                                    id="precioHora"
                                    th:field="*{precioHora}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('precioHora')} ? ' is-invalid' : ''"
                                    min="0.01"
                                    step="0.01">

                                <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('precioHora')}"
                                    th:errors="*{precioHora}">
                                </div>

                            </div>

                            <div class="mb-3">

                                <label for="idSuperficie" class="form-label">
                                    Superficie
                                </label>

                                <select
                                    id="idSuperficie"
                                    th:field="*{idSuperficie}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('idSuperficie')} ? ' is-invalid' : ''">

                                    <option value="">
                                        Seleccione una superficie
                                    </option>

                                    <option
                                        th:each="superficie : ${superficies}"
                                        th:value="${superficie.idSuperficie}"
                                        th:text="${superficie.descripcion}">
                                    </option>

                                </select>

                                <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('idSuperficie')}"
                                    th:errors="*{idSuperficie}">
                                </div>

                            </div>

                            <div class="mb-4">

                                <label for="idEstado" class="form-label">
                                    Estado
                                </label>

                                <select
                                    id="idEstado"
                                    th:field="*{idEstado}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('idEstado')} ? ' is-invalid' : ''">

                                    <option value="">
                                        Seleccione un estado
                                    </option>

                                    <option
                                        th:each="estado : ${estados}"
                                        th:value="${estado.idEstado}"
                                        th:text="${estado.descripcion}">
                                    </option>

                                </select>

                                <div
                                    class="invalid-feedback"
                                    th:if="${#fields.hasErrors('idEstado')}"
                                    th:errors="*{idEstado}">
                                </div>

                            </div>

                            <div class="d-flex gap-2">

                                <button
                                    type="submit"
                                    class="btn btn-primary">

                                    Guardar
                                </button>

                                <a
                                    th:href="@{/canchas}"
                                    class="btn btn-secondary">

                                    Cancelar
                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </main>

</body>

</html>
