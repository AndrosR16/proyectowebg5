<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Estados</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Estados</h2>

        <a th:href="@{/estados/nuevo}"
           class="btn btn-success">
            Nuevo Estado
        </a>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Descripción</th>
            <th width="180">Acciones</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="estado : ${estados}">

            <td th:text="${estado.idEstado}"></td>

            <td th:text="${estado.descripcion}"></td>

            <td>

                <a class="btn btn-warning btn-sm"
                   th:href="@{/estados/editar/{id}(id=${estado.idEstado})}">
                    Editar
                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/estados/eliminar/{id}(id=${estado.idEstado})}"
                   onclick="return confirm('¿Desea eliminar este estado?');">
                    Eliminar
                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <a th:href="@{/}"
       class="btn btn-secondary">
        Regresar
    </a>

</div>

</body>

</html>
