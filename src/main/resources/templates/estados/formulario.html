<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Estado</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4"
        th:text="${estado.idEstado == null} ? 'Nuevo Estado' : 'Editar Estado'">
    </h2>

    <form th:action="${estado.idEstado == null} ?
                     @{/estados/guardar} :
                     @{/estados/actualizar}"
          th:object="${estado}"
          method="post">

        <div class="mb-3">

            <label class="form-label">ID</label>

            <input type="number"
                   class="form-control"
                   th:field="*{idEstado}"
                   th:readonly="${estado.idEstado != null}"
                   required>

        </div>

        <div class="mb-4">

            <label class="form-label">Descripción</label>

            <input type="text"
                   class="form-control"
                   th:field="*{descripcion}"
                   maxlength="100"
                   required>

        </div>

        <button type="submit"
                class="btn btn-success">
            Guardar
        </button>

        <a th:href="@{/estados}"
           class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>

</html>
