<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${pago.idPago == null ? 'Nuevo pago' : 'Editar pago'}">
        Pago
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6">

            <div class="card shadow-sm">

                <div class="card-header bg-dark text-white">

                    <h2 class="h4 mb-0"
                        th:text="${pago.idPago == null ? 'Nuevo pago' : 'Editar pago'}">
                        Pago
                    </h2>

                </div>

                <div class="card-body">

                    <form
                        th:action="${pago.idPago == null
                            ? '/pagos/guardar'
                            : '/pagos/actualizar'}"
                        th:object="${pago}"
                        method="post">

                        <div class="mb-3">

                            <label for="idPago"
                                   class="form-label">
                                ID del pago
                            </label>

                            <input
                                type="number"
                                id="idPago"
                                class="form-control"
                                th:field="*{idPago}"
                                th:readonly="${pago.idPago != null}"
                                min="1"
                                required>

                        </div>

                        <div class="mb-3">

                            <label for="idReserva"
                                   class="form-label">
                                ID de la reserva
                            </label>

                            <input
                                type="number"
                                id="idReserva"
                                class="form-control"
                                th:field="*{idReserva}"
                                min="1"
                                required>

                            <div class="form-text">
                                Debe ingresar el ID de una reserva existente.
                            </div>

                        </div>

                        <div class="mb-3">

                            <label for="monto"
                                   class="form-label">
                                Monto
                            </label>

                            <input
                                type="number"
                                id="monto"
                                class="form-control"
                                th:field="*{monto}"
                                min="0.01"
                                step="0.01"
                                required>

                        </div>

                        <div class="mb-3">

                            <label for="idMetodoPago"
                                   class="form-label">
                                Método de pago
                            </label>

                            <select
                                id="idMetodoPago"
                                class="form-select"
                                th:field="*{idMetodoPago}"
                                required>

                                <option value="">
                                    Seleccione un método de pago
                                </option>

                                <option
                                    th:each="metodo : ${metodosPago}"
                                    th:value="${metodo.idMetodoPago}"
                                    th:text="${metodo.nombreMetodo}">
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label for="idEstado"
                                   class="form-label">
                                Estado
                            </label>

                            <select
                                id="idEstado"
                                class="form-select"
                                th:field="*{idEstado}"
                                required>

                                <option value="">
                                    Seleccione un estado
                                </option>

                                <option
                                    th:each="estado : ${estados}"
                                    th:value="${estado.idEstado}"
                                    th:text="${estado.descripcion}">
                                </option>

                            </select>

                        </div>

                        <div class="d-flex justify-content-end gap-2">

                            <a th:href="@{/pagos}"
                               class="btn btn-secondary">
                                Cancelar
                            </a>

                            <button type="submit"
                                    class="btn btn-primary"
                                    th:text="${pago.idPago == null
                                        ? 'Guardar'
                                        : 'Actualizar'}">
                                Guardar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
