<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pagos</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h1>Pagos</h1>

            <p class="text-muted mb-0">
                Administración de pagos registrados.
            </p>
        </div>

        <a th:href="@{/pagos/nuevo}"
           class="btn btn-primary">
            Nuevo pago
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Reserva</th>
                        <th>Monto</th>
                        <th>Método de pago</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="pago : ${pagos}">

                        <td th:text="${pago.idPago}">
                            1
                        </td>

                        <td th:text="${pago.idReserva}">
                            1
                        </td>

                        <td th:text="${'₡ ' + #numbers.formatDecimal(pago.monto, 1, 2)}">
                            ₡ 10000.00
                        </td>

                        <td>

                            <span th:each="metodo : ${metodosPago}"
                                  th:if="${metodo.idMetodoPago == pago.idMetodoPago}"
                                  th:text="${metodo.nombreMetodo}">
                                Efectivo
                            </span>

                        </td>

                        <td>

                            <span th:each="estado : ${estados}"
                                  th:if="${estado.idEstado == pago.idEstado}"
                                  th:text="${estado.descripcion}">
                                Activo
                            </span>

                        </td>

                        <td class="text-center">

                            <a th:href="@{/pagos/editar/{id}(id=${pago.idPago})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(pagos)}">

                        <td colspan="6"
                            class="text-center text-muted py-4">

                            No hay pagos registrados.

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <div class="mt-4">

        <a th:href="@{/}"
           class="btn btn-secondary">
            Volver al inicio
        </a>

    </div>

</div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
