<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pagos</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h1>Pagos</h1>
                <p class="text-muted">
                    Lista de pagos registrados en el sistema.
                </p>
            </div>

            <a th:href="@{/pagos/nuevo}"
               class="btn btn-primary">
                Nuevo pago
            </a>

        </div>

        <div class="card shadow-sm">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-striped table-hover align-middle">

                        <thead class="table-dark">

                            <tr>
                                <th>ID pago</th>
                                <th>ID reserva</th>
                                <th>Monto</th>
                                <th>Método de pago</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="pago : ${pagos}">

                                <td th:text="${pago.idPago}">
                                    1
                                </td>

                                <td th:text="${pago.idReserva}">
                                    1
                                </td>

                                <td th:text="${pago.monto}">
                                    15000
                                </td>

                                <td th:text="${pago.nombreMetodo}">
                                    Efectivo
                                </td>

                                <td th:text="${pago.nombreEstado}">
                                    Finalizado
                                </td>

                                <td>

                                    <a th:href="@{/pagos/editar/{id}(id=${pago.idPago})}"
                                       class="btn btn-warning btn-sm">
                                        Editar
                                    </a>

                                    <a th:href="@{/pagos/eliminar/{id}(id=${pago.idPago})}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('¿Está seguro de eliminar este pago?')">
                                        Eliminar
                                    </a>

                                </td>

                            </tr>

                            <tr th:if="${#lists.isEmpty(pagos)}">

                                <td colspan="6"
                                    class="text-center text-muted">
                                    No hay pagos registrados.
                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

        <div class="mt-4">

            <a th:href="@{/}"
               class="btn btn-secondary">
                Volver al inicio
            </a>

        </div>

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
