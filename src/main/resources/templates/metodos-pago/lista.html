<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Métodos de pago</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Métodos de pago</h1>
            <p class="text-muted mb-0">
                Administración de métodos de pago registrados.
            </p>
        </div>

        <a th:href="@{/metodos-pago/nuevo}"
           class="btn btn-primary">
            Nuevo método de pago
        </a>
    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="metodo : ${metodosPago}">

                        <td th:text="${metodo.idMetodoPago}">
                            1
                        </td>

                        <td th:text="${metodo.nombreMetodo}">
                            Tarjeta
                        </td>

                        <td th:text="${metodo.descripcion}">
                            Pago mediante tarjeta
                        </td>

                        <td>
                            <span th:each="estado : ${estados}"
                                  th:if="${estado.idEstado == metodo.idEstado}"
                                  th:text="${estado.descripcion}">
                                Activo
                            </span>
                        </td>

                        <td class="text-center">

                            <a th:href="@{/metodos-pago/editar/{id}(id=${metodo.idMetodoPago})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a th:href="@{/metodos-pago/eliminar/{id}(id=${metodo.idMetodoPago})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro de eliminar este método de pago?');">
                                Eliminar
                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(metodosPago)}">

                        <td colspan="5"
                            class="text-center text-muted py-4">

                            No hay métodos de pago registrados.

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <div class="mt-4">
        <a th:href="@{/}"
           class="btn btn-secondary">
            Volver al inicio
        </a>
    </div>

</div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
