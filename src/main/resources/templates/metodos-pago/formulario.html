<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${metodoPago.idMetodoPago == null
        ? 'Nuevo método de pago'
        : 'Editar método de pago'}">
        Método de pago
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6">

            <div class="card shadow-sm">

                <div class="card-header bg-dark text-white">

                    <h2 class="h4 mb-0"
                        th:text="${metodoPago.idMetodoPago == null
                            ? 'Nuevo método de pago'
                            : 'Editar método de pago'}">
                        Método de pago
                    </h2>

                </div>

                <div class="card-body">

                    <form
                        th:action="${metodoPago.idMetodoPago == null
                            ? '/metodos-pago/guardar'
                            : '/metodos-pago/actualizar'}"
                        th:object="${metodoPago}"
                        method="post">

                        <div class="mb-3">

                            <label for="idMetodoPago"
                                   class="form-label">
                                ID del método de pago
                            </label>

                            <input
                                type="number"
                                id="idMetodoPago"
                                class="form-control"
                                th:field="*{idMetodoPago}"
                                th:readonly="${metodoPago.idMetodoPago != null}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label for="nombreMetodo"
                                   class="form-label">
                                Nombre
                            </label>

                            <input
                                type="text"
                                id="nombreMetodo"
                                class="form-control"
                                th:field="*{nombreMetodo}"
                                maxlength="100"
                                required>

                        </div>

                        <div class="mb-3">

                            <label for="descripcion"
                                   class="form-label">
                                Descripción
                            </label>

                            <textarea
                                id="descripcion"
                                class="form-control"
                                th:field="*{descripcion}"
                                maxlength="200"
                                rows="3">
                            </textarea>

                        </div>

                        <div class="mb-3">

                            <label for="idEstado"
                                   class="form-label">
                                Estado
                            </label>

                            <select
                                id="idEstado"
                                class="form-select"
                                th:field="*{idEstado}"
                                required>

                                <option value="">
                                    Seleccione un estado
                                </option>

                                <option
                                    th:each="estado : ${estados}"
                                    th:value="${estado.idEstado}"
                                    th:text="${estado.descripcion}">
                                </option>

                            </select>

                        </div>

                        <div class="d-flex justify-content-end gap-2">

                            <a th:href="@{/metodos-pago}"
                               class="btn btn-secondary">
                                Cancelar
                            </a>

                            <button type="submit"
                                    class="btn btn-primary"
                                    th:text="${metodoPago.idMetodoPago == null
                                        ? 'Guardar'
                                        : 'Actualizar'}">
                                Guardar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
