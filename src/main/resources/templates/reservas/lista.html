<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reservas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h1 class="mb-1">Reservas</h1>

                <p class="text-muted mb-0">
                    Administración de las reservas de las canchas.
                </p>
            </div>

            <a th:href="@{/reservas/nuevo}" class="btn btn-primary">
                Nueva reserva
            </a>

        </div>

        <div class="card shadow-sm">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-striped table-hover align-middle">

                        <thead class="table-dark">

                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Horario</th>
                                <th>Fecha</th>
                                <th>Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="reserva : ${reservas}">

                                <td th:text="${reserva.idReserva}">
                                    1
                                </td>

                                <td th:text="${reserva.nombreUsuario}">
                                    Carlos Rodríguez Mora
                                </td>

                                <td th:text="${reserva.descripcionHorario}">
                                    Lunes 08:00 - 10:00
                                </td>

                                <td th:text="${#temporals.format(reserva.fechaReserva, 'dd/MM/yyyy')}">
                                    20/07/2026
                                </td>

                                <td>

                                    <span th:if="${reserva.nombreEstado == 'Activo'}" class="badge text-bg-success"
                                        th:text="${reserva.nombreEstado}">
                                        Activo
                                    </span>

                                    <span th:unless="${reserva.nombreEstado == 'Activo'}"
                                        class="badge text-bg-secondary" th:text="${reserva.nombreEstado}">
                                        Inactivo
                                    </span>

                                </td>

                                <td class="text-center">

                                    <a th:href="@{/reservas/editar/{id}(id=${reserva.idReserva})}"
                                        class="btn btn-warning btn-sm">
                                        Editar
                                    </a>

                                    <a th:href="@{/reservas/eliminar/{id}(id=${reserva.idReserva})}"
                                        class="btn btn-secondary btn-sm"
                                        onclick="return confirm('¿Está seguro de inactivar esta reserva?');">
                                        Inactivar
                                    </a>

                                </td>

                            </tr>

                            <tr th:if="${#lists.isEmpty(reservas)}">

                                <td colspan="6" class="text-center text-muted py-4">

                                    No hay reservas registradas.

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

        <div class="mt-4">

            <a th:href="@{/}" class="btn btn-outline-secondary">
                Volver al inicio
            </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
