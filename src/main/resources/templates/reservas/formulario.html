<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${reserva.idReserva == null ? 'Nueva reserva' : 'Editar reserva'}">
        Reserva
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow-sm">

                    <div class="card-body p-4">

                        <h1 class="mb-4" th:text="${reserva.idReserva == null ? 'Nueva reserva' : 'Editar reserva'}">
                            Reserva
                        </h1>

                        <form th:action="${reserva.idReserva == null}
                                ? @{/reservas/guardar}
                                : @{/reservas/actualizar}" th:object="${reserva}" method="post">

                            <div class="mb-3" th:if="${reserva.idReserva != null}">

                                <label for="idReserva" class="form-label">
                                    ID de reserva
                                </label>

                                <input type="number" id="idReserva" th:field="*{idReserva}" class="form-control"
                                    readonly>

                            </div>

                            <div class="mb-3" th:if="${reserva.idReserva == null}">

                                <label for="idReserva" class="form-label">
                                    ID de reserva
                                </label>

                                <input type="number" id="idReserva" th:field="*{idReserva}" class="form-control" min="1"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label for="idUsuario" class="form-label">
                                    Usuario
                                </label>

                                <select id="idUsuario" th:field="*{idUsuario}" class="form-select" required>

                                    <option value="">
                                        Seleccione un usuario
                                    </option>

                                    <option th:each="usuario : ${usuarios}" th:value="${usuario.idUsuario}"
                                        th:text="${usuario.nombreCompleto}">
                                        Carlos Rodríguez Mora
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label for="idHorario" class="form-label">
                                    Horario
                                </label>

                                <select id="idHorario" th:field="*{idHorario}" class="form-select" required>

                                    <option value="">
                                        Seleccione un horario
                                    </option>

                                    <option th:each="horario : ${horarios}" th:value="${horario.idHorario}"
                                        th:text="${horario.cancha + ' - ' + horario.diaSemana + ' ' + horario.horaInicio + ' - ' + horario.horaFin}">
                                        Cancha Central - Lunes 08:00 - 10:00
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label for="fechaReserva" class="form-label">
                                    Fecha de reserva
                                </label>

                                <input type="date" id="fechaReserva" th:field="*{fechaReserva}" class="form-control"
                                    required>

                            </div>

                            <div class="mb-4">

                                <label for="idEstado" class="form-label">
                                    Estado
                                </label>

                                <select id="idEstado" th:field="*{idEstado}" class="form-select" required>

                                    <option value="">
                                        Seleccione un estado
                                    </option>

                                    <option th:each="estado : ${estados}" th:value="${estado.idEstado}"
                                        th:text="${estado.descripcion}">
                                        Activo
                                    </option>

                                </select>

                            </div>

                            <div class="d-flex gap-2">

                                <button type="submit" class="btn btn-primary">

                                    <span
                                        th:text="${reserva.idReserva == null ? 'Guardar reserva' : 'Actualizar reserva'}">
                                        Guardar
                                    </span>

                                </button>

                                <a th:href="@{/reservas}" class="btn btn-outline-secondary">
                                    Cancelar
                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
